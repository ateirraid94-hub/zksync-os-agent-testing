[package]
name = "system_hooks_proving"
resolver = "2"
version = "0.1.0"
edition = "2021"
authors = ["The Matter Labs Team <hello@matterlabs.dev>"]
homepage = "https://zksync.io/"
repository = "https://github.com/matter-labs/zksync-os/"
license = "MIT OR Apache-2.0"
keywords = ["blockchain", "zksync", "zk", "risc-v"]
categories = ["cryptography"]

[lib]
path = "../../../../../system_hooks/src/lib.rs"

[dependencies]
zk_ee = { package = "zk_ee_proving", path = "../zk_ee_proving", default-features = false }
ruint = { version = "1.12.3", default-features = false, features = ["alloc"] }
evm_interpreter = { package = "evm_interpreter_proving", path = "../evm_interpreter_proving"  }
cycle_marker = { path = "../../../../../cycle_marker" }

arrayvec = { version = "0.7.4", default-features = false }
strum_macros = "0.27.1"
paste = "1.0.15"

[features]
point_eval_precompile = ["evm_interpreter/point_eval_precompile"]
mock-unsupported-precompiles = ["evm_interpreter/mock-unsupported-precompiles"]
p256_precompile = ["evm_interpreter/p256_precompile"]
cycle_marker = ["cycle_marker/log_to_file"]
