[package]
name = "eth_runner"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
rig = { path = "../../rig" }
zk_ee = { path = "../../../zk_ee" }
basic_system = { path = "../../../basic_system" }
forward_system = { path = "../../../forward_system" }
system_hooks = { path = "../../../system_hooks" }
zksync_os_runner = { path = "../../../zksync_os_runner" }

serde = { workspace = true, features = ["derive"] }
ruint = { workspace = true, default-features = false }

alloy = { version = "1", features = ["rlp", "full", "ssz", "eips"] }
alloy-primitives = { version = "1", features = ["arbitrary"] }
alloy-rpc-types-eth = { version = "*", features = ["serde"] }
alloy-rpc-types-debug = { version = "*", default-features = false }
alloy-rlp = { version = "*" }

serde_json = "1.0"
clap = { version = "4.4", features = ["derive"] }
anyhow = "=1.0.89"
hex = "*"
ureq = { version = "2", features = ["json"] }
sled = {version = "0.34" }
bincode = { version = "2", features = ["serde"] }
serde_with = "3.13.0"
csv = "1.3"

[dev-dependencies]
# execution_utils = { git = "https://github.com/matter-labs/zksync-airbender", branch = "av_jit", default-features = false, features = ["prover", "verifier_80"] }
execution_utils = { git = "https://github.com/matter-labs/zksync-airbender", branch = "av_jit", default-features = false, features = ["prover"] }
risc_v_simulator = { git = "https://github.com/matter-labs/zksync-airbender", branch = "av_jit", features = ["delegation"] }

[features]
simulate_witness_gen = ["rig/simulate_witness_gen"]
# default = []
# default = ["evm_replay"]
# default = ["evm_replay", "pectra"]
default = ["evm_replay", "pectra", "debug_satisfiable", "precheck_satisfied"]
risc_v_logs = []
evm_replay = ["rig/prevrandao", "rig/unlimited_native", "rig/disable_system_contracts", "rig/evm_refunds", "rig/evm-compatibility"]
pectra = ["rig/pectra"]

debug_satisfiable = ["execution_utils/debug_satisfiable"]
# Will perform satisfiability tests on witness
precheck_satisfied = ["execution_utils/precheck_satisfied"]